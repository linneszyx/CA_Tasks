<template>
    <section class="slds-modal slds-fade-in-open">
        <div class="slds-modal__container">

            <header class="slds-modal__header">
                <h2 class="slds-text-heading_medium">Extend Warranty</h2>
            </header>

            <div class="slds-modal__content slds-p-around_medium">

                <lightning-input
                    type="date"
                    label="New Warranty End Date"
                    value={newDate}
                    onchange={handleDateChange}>
                </lightning-input>

            </div>

            <footer class="slds-modal__footer">
                <lightning-button label="Cancel" onclick={close}></lightning-button>
                <lightning-button variant="brand" label="Save" onclick={extend}></lightning-button>
            </footer>

        </div>
    </section>

    <div class="slds-backdrop slds-backdrop_open"></div>
</template>
