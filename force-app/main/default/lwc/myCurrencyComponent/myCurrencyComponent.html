<template>
    <lightning-card title="Currency Exchange">
        <div class="slds-p-around_medium">
            <lightning-input type="text" label="Search Currency" placeholder="Search USD..."
                onchange={handleSearch}>
            </lightning-input>
            <lightning-datatable key-field="sno" data={currencyTable} columns={columns} class="slds-m-top_medium">
            </lightning-datatable>
            <div class="slds-m-top_medium slds-align_absolute-center">
                <lightning-button label="Previous" onclick={handlePrevious} disabled={isPreviousDisabled}>
                </lightning-button>
                <span class="slds-m-horizontal_medium">
                    Page {currentPage} of {totalPages}
                </span>
                <lightning-button label="Next" onclick={handleNext} disabled={isNextDisabled}>
                </lightning-button>
            </div>
        </div>
    </lightning-card>
</template>
