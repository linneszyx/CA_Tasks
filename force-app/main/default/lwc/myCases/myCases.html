<template>
    <lightning-card title="My Cases" icon-name="standard:case">
        <template if:true={hasCases}>
            <div class="slds-grid slds-wrap slds-grid_pull-padded-small">
                <template for:each={pagedCases} for:item="c">
                    <div key={c.Id} class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-p-horizontal_small">
                        <article class="slds-box slds-theme_default slds-card__body_inner">
                            <div class="slds-grid slds-grid_align-spread slds-m-bottom_x-small">
                                <h3 class="slds-text-heading_small slds-truncate" title={c.Subject}>{c.Subject}</h3>
                                <div class="slds-text-color_weak slds-text-body_small">{c.CaseNumber}</div>
                            </div>
                            <p class="slds-text-body_small slds-m-bottom_x-small">Status: <strong>{c.Status}</strong>
                            </p>
                            <div class="slds-grid slds-grid_align-end">
                                <lightning-button variant="neutral" label="View" data-id={c.Id}
                                    onclick={handleViewCase}></lightning-button>
                            </div>
                        </article>
                    </div>
                </template>
            </div>
            <div class="slds-grid slds-grid_align-center slds-m-top_medium">
                <div class="slds-col">
                    <lightning-button variant="neutral" label="Previous" onclick={handlePrev}
                        disabled={isFirstPage}></lightning-button>
                </div>
                <div class="slds-col slds-p-horizontal_medium slds-align_absolute-center">
                    Page {currentPage} of {totalPages}
                </div>
                <div class="slds-col">
                    <lightning-button variant="neutral" label="Next" onclick={handleNext}
                        disabled={isLastPage}></lightning-button>
                </div>
                <div class="slds-col slds-p-left_medium">
                    <lightning-combobox name="pageSize" value={pageSize} options={pageSizeOptions}
                        onchange={handlePageSizeChange}></lightning-combobox>
                </div>
            </div>
        </template>
        <template if:false={hasCases}>
            <div class="slds-p-around_medium">
                <p class="slds-text-body_regular">No cases found.</p>
            </div>
        </template>
    </lightning-card>
</template>
