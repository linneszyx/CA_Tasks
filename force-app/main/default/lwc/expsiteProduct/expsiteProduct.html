<template>
    <template if:true={hasData}>
        <template for:each={finalData} for:item="rec">
            <div key={rec.Id} class="slds-box slds-m-bottom_small">
                <p><b>{rec.Name}</b></p>
                <p>Status : {rec.Status}</p>
                <lightning-button label='Create Case' data-id={rec.Id} onclick={createCase}></lightning-button>
            </div>
        </template>
    </template>
    <template if:false={hasData}>
        <p>No Data</p>
    </template>
</template>
