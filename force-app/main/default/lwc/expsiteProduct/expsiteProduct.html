<template>
    <template if:true={hasData}>
        <lightning-datatable key-field="Id" data={pagedData} columns={columns} onrowaction={handleRowAction}
            hide-checkbox-column>
        </lightning-datatable>
        <div class="pagination slds-grid slds-grid_align-center slds-m-top_medium">
            <div class="slds-col">
                <lightning-button variant="neutral" label="Previous" onclick={handlePrev}
                    disabled={isFirstPage}></lightning-button>
            </div>
            <div class="slds-col slds-p-horizontal_medium slds-align_absolute-center">
                Page {currentPage} of {totalPages}
            </div>
            <div class="slds-col">
                <lightning-button variant="neutral" label="Next" onclick={handleNext}
                    disabled={isLastPage}></lightning-button>
            </div>
            <div class="slds-col slds-p-left_medium">
                <lightning-combobox name="pageSize" value={pageSize} placeholder="Select page size"
                    options={pageSizeOptions} onchange={handlePageSizeChange}>
                </lightning-combobox>
            </div>
        </div>
    </template>
    <template if:false={hasData}>
        <p>No Data</p>
    </template>
</template>
